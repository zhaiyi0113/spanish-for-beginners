    function inferPos(word) {
      if (/^(el |la |los |las |un |una )/.test(word)) return '名词';

      if (/\/$/.test(word)) return '表达';
      return '词汇 / 表达';
    }
    function inferNote(word) {
      if (/^el /.test(word)) return '和 el 一起记，通常为阳性名词。';
      if (/^la /.test(word)) return '和 la 一起记，通常为阴性名词。';
      if (/(ar|er|ir|arse|erse|irse)$/.test(word)) return '先听原形，再在例句和对话中注意它的变化。';
      return '结合例句和对话一起记忆。';

    function voiceFor(role) {

    async function speakSequence(items, options, onEach, gap = 1000) {
      stopAll(); const myRun = state.run;

        onEach?.(items[i], i);

    const $ = selector => document.querySelector(selector);
    function currentLesson() { return lessons[state.lessonId - 1]; }
    const localized = (zh, en) => isEnglish() ? en : zh;

    function accountName(user = state.user) {
      return user?.displayName || user?.email?.split('@')[0] || localized('学习者', 'Learner');
    }
    function renderAccount() {
      const signedIn = Boolean(state.user);
      $('#account-toggle').textContent = signedIn ? accountName() : localized('登录 / 注册', 'Sign in / Register');
      $('#account-summary').textContent = signedIn
        ? localized(`你好，${accountName()}。你的学习进度会自动同步。`, `Hello, ${accountName()}. Your learning progress syncs automatically.`)
        : localized('创建账号后，可在不同设备继续学习。', 'Create an account to continue on any device.');
      $('#account-open').hidden = signedIn;
      $('#account-open').textContent = localized('登录 / 注册', 'Sign in / Register');
      $('#logout').hidden = !signedIn;
      $('#logout').textContent = localized('退出登录', 'Sign out');
    }
    function renderProgress() {
      const signedIn = Boolean(state.user);
      const completed = state.completedLessons.length;
      const finished = state.completedLessons.includes(state.lessonId);
      $('#course-progress-heading').textContent = localized('学习进度', 'Learning progress');
      $('#course-progress').value = completed;
      $('#course-progress-text').textContent = signedIn
        ? localized(`已完成 ${completed} / 50 课；当前位置：第 ${state.lessonId} 课。`, `${completed} / 50 lessons completed; you are at lesson ${state.lessonId}.`)
        : localized('登录或注册后，可在不同设备继续学习。', 'Sign in or register to continue on any device.');
      $('#complete-lesson').textContent = !signedIn
        ? localized('登录后记录本课', 'Sign in to record this lesson')
        : finished ? localized('取消完成标记', 'Remove completion mark') : localized('完成本课', 'Mark this lesson complete');
      $('#complete-lesson').className = signedIn && !finished ? 'primary' : 'secondary';
    }
    function updateAuthForm() {
      const registering = state.authMode === 'register';
      $('#auth-heading').textContent = registering ? localized('创建学习账号', 'Create a learning account') : localized('登录学习账号', 'Sign in to your account');
      $('#auth-hint').textContent = registering
        ? localized('使用用户名、邮箱和密码创建账号；密码由 Firebase 安全管理。', 'Create an account with a display name, email and password. Firebase manages the password securely.')
        : localized('使用注册时的邮箱和密码登录。', 'Use the email address and password you registered with.');
      $('#auth-name-row').hidden = !registering;
      $('#auth-name').required = registering;
      $('#auth-password').autocomplete = registering ? 'new-password' : 'current-password';
      $('#auth-submit').textContent = registering ? localized('创建账号', 'Create account') : localized('登录', 'Sign in');
      $('#auth-switch').textContent = registering ? localized('已有账号？登录', 'Already have an account? Sign in') : localized('没有账号？创建一个', 'No account yet? Create one');
    }
    function openAuthModal(mode = 'register') {
      state.authMode = mode;
      $('#account-panel').hidden = true;
      $('#auth-status').textContent = '';
      updateAuthForm();
      $('#auth-modal').hidden = false;
      (mode === 'register' ? $('#auth-name') : $('#auth-email')).focus();
    }
    function closeAuthModal() { $('#auth-modal').hidden = true; $('#auth-form').reset(); $('#auth-status').textContent = ''; }
    function authErrorMessage(error) {
      const code = error?.code || '';
      if (code === 'auth/email-already-in-use') return localized('这个邮箱已经注册，请直接登录。', 'This email is already registered. Please sign in.');
      if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') return localized('邮箱或密码不正确。', 'The email address or password is incorrect.');
      if (code === 'auth/weak-password') return localized('密码至少需要 6 个字符。', 'Your password needs at least 6 characters.');
      if (code === 'auth/invalid-email') return localized('请输入有效的邮箱地址。', 'Enter a valid email address.');
      if (code === 'auth/network-request-failed') return localized('网络连接失败，请稍后重试。', 'Network connection failed. Please try again.');
      return localized('暂时无法完成操作，请稍后重试。', 'We could not complete that action. Please try again.');
    }
    async function saveProgress({ includeCreatedAt = false } = {}) {
      if (!state.user) return;
      const completedLessons = [...new Set(state.completedLessons)].filter(id => Number.isInteger(id) && id >= 1 && id <= lessons.length).sort((a, b) => a - b);
      state.completedLessons = completedLessons;
      const data = { displayName: accountName(), lastLesson: state.lessonId, completedLessons, updatedAt: serverTimestamp() };
      if (includeCreatedAt) data.createdAt = serverTimestamp();
      await setDoc(doc(db, 'users', state.user.uid), data, { merge: true });
    }
    async function loadProgress(user) {
      try {
        const snapshot = await getDoc(doc(db, 'users', user.uid));
        const saved = snapshot.exists() ? snapshot.data() : {};
        state.completedLessons = Array.isArray(saved.completedLessons) ? saved.completedLessons.filter(id => Number.isInteger(id) && id >= 1 && id <= lessons.length) : [];
        if (Number.isInteger(saved.lastLesson) && saved.lastLesson >= 1 && saved.lastLesson <= lessons.length) {
          state.lessonId = saved.lastLesson;
          localStorage.setItem('spanish-course-lesson', state.lessonId);
          history.replaceState(null, '', `#leccion-${state.lessonId}`);
        }
      } catch (error) {
        $('#course-progress-text').textContent = localized('进度暂时无法同步，请稍后再试。', 'Progress cannot sync right now. Please try again later.');
      }
      render();
    }
    async function handleAuthSubmit(event) {
      event.preventDefault();
      const email = $('#auth-email').value.trim();
      const password = $('#auth-password').value;
      const name = $('#auth-name').value.trim();
      $('#auth-status').textContent = '';
      $('#auth-submit').disabled = true;
      try {
        if (state.authMode === 'register') {
          if (name.length < 2) throw { code: 'display-name-too-short' };
          const credential = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(credential.user, { displayName: name });
          state.user = auth.currentUser;
          state.completedLessons = [];
          await saveProgress({ includeCreatedAt: true });
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
        closeAuthModal();
      } catch (error) {
        $('#auth-status').textContent = error?.code === 'display-name-too-short'
          ? localized('用户名至少需要 2 个字符。', 'Your display name needs at least 2 characters.')
          : authErrorMessage(error);
      } finally {
        $('#auth-submit').disabled = false;
      }
    }
    function renderStatic() {
      const l = labels[state.lang];
      $('#site-name').textContent = l.siteName; $('#site-intro').textContent = l.siteIntro; $('#language-toggle').textContent = l.switch;
      $('#term-heading').textContent = l.termHeading; $('#term-three').textContent = l.termThree; $('#term-one').textContent = l.termOne;
      $('#word-heading').textContent = l.wordHeading; $('#word-note').textContent = l.wordNote; $('#example-heading').textContent = l.exampleHeading;
      $('#dialogue-heading').textContent = l.dialogueHeading; $('#grammar-heading').textContent = l.grammarHeading;
      $('#play-examples').textContent = isEnglish() ? 'Play all examples' : '播放全部例句'; $('#play-dialogue').textContent = isEnglish() ? 'Play dialogue' : '播放对话';
      document.querySelectorAll('.stop-all').forEach(button => button.textContent = l.stop);
      document.querySelectorAll('.speed-controls span').forEach(span => span.textContent = l.speed);
      $('#previous').textContent = $('#previous-bottom').textContent = l.previous; $('#next').textContent = $('#next-bottom').textContent = l.next;
      renderAccount(); renderProgress(); updateAuthForm();
    }
    function renderNav() {
      const l = labels[state.lang];
      $('#lesson-nav').innerHTML = lessons.map(lesson => `<a class="lesson-link ${lesson.id === state.lessonId ? 'active' : ''}" href="#leccion-${lesson.id}" data-lesson="${lesson.id}"><span class="lesson-number">${l.lesson} ${lesson.id}${l.lessonSuffix}</span><span class="lesson-name">${isEnglish() ? lesson.titleEn : lesson.title}</span></a>`).join('');
    }
    function render() {
      stopAll(); state.dialogueStart = 0;
      renderStatic();
      const lesson = currentLesson(); const examples = pairExamples(lesson); const dialogue = makeDialogue(lesson);
      $('#lesson-number').textContent = isEnglish() ? `LESSON ${String(lesson.id).padStart(2, '0')} · ${labels.en.daily}` : `LECCIÓN ${String(lesson.id).padStart(2, '0')} · ${labels.zh.daily}`;
      $('#lesson-title').textContent = isEnglish() ? lesson.titleEn : lesson.title;
      $('#lesson-goal').textContent = isEnglish() ? labels.en.goal : lesson.goal;
      $('#term-current').textContent = localized('准备开始', 'Ready to begin'); $('#term-status').textContent = localized('选择每词朗读次数；每一次结束后停顿 1 秒。', 'Choose a repetition count; every reading is followed by a one-second pause.');
      $('#example-current').textContent = localized('准备听例句', 'Ready to hear examples'); $('#example-status').textContent = localized('5 个例句，每句朗读 1 遍。', 'Five examples; each is read once.');
      $('#dialogue-current').textContent = localized('准备听 A 和 B 的对话', 'Ready to hear the A/B dialogue'); $('#dialogue-status').textContent = localized('整段对话朗读 1 遍。', 'The full dialogue is read once.');
      $('#dialogue-progress').value = 0; $('#dialogue-position').textContent = localized('从第 1 / 5 句开始播放', 'Start from line 1 / 5');
      $('#word-grid').innerHTML = lesson.words.map((w, index) => { const forms = formsFor(w); return `<article class="word-card"><div class="word-top"><div><div class="word">${w.word}</div><div class="translation">${meaningFor(w)}</div></div><button class="secondary small word-play" data-index="${index}" type="button">${labels[state.lang].play}</button></div><div class="meta"><strong>${labels[state.lang].pos}</strong>${posFor(w)}</div><div class="meta"><strong>${labels[state.lang].note}</strong>${noteFor(w)}</div>${forms.length ? `<div class="forms"><strong>${labels[state.lang].forms}</strong>${forms.map(f => `<button class="secondary small form-play" data-form="${f.split(/[＝=]/)[0]}" type="button">${f}</button>`).join(' ')}</div>` : ''}</article>`; }).join('');
      $('#examples').innerHTML = examples.map((e, index) => `<article class="example"><span class="spanish">${e.es}</span><button class="secondary small example-play" data-index="${index}" type="button">${labels[state.lang].playSentence}</button><div class="chinese">${translationFor(e)}</div></article>`).join('');
      $('#dialogue').innerHTML = dialogue.map((line, index) => `<article class="line"><span class="speaker">${line[0]}</span><span class="spanish">${line[1]}</span><button class="secondary small dialogue-play" data-index="${index}" type="button">${labels[state.lang].playSentence}</button><div class="chinese">${localized(line[2], line[3])}</div></article>`).join('');
      $('#grammar').innerHTML = grammarFor(lesson).map(g => `<li>${g}</li>`).join('');
      renderNav(); bindLessonContent();
      $('#previous').disabled = $('#previous-bottom').disabled = lesson.id === 1;
      $('#next').disabled = $('#next-bottom').disabled = lesson.id === lessons.length;
    }
    function bindLessonContent() {
      const lesson = currentLesson(), examples = pairExamples(lesson), dialogue = makeDialogue(lesson);
      document.querySelectorAll('.word-play').forEach(button => button.addEventListener('click', async () => { const w = lesson.words[Number(button.dataset.index)]; $('#term-current').textContent = `${w.word} · ${meaningFor(w)}`; $('#term-status').textContent = localized('本词朗读 1 遍。', 'This word is read once.'); await speak(w.word); }));
      document.querySelectorAll('.form-play').forEach(button => button.addEventListener('click', async () => { $('#term-current').textContent = button.dataset.form; $('#term-status').textContent = localized('这个动词形式朗读 1 遍。', 'This verb form is read once.'); await speak(button.dataset.form); }));
      document.querySelectorAll('.example-play').forEach(button => button.addEventListener('click', async () => { const e = examples[Number(button.dataset.index)]; $('#example-current').textContent = e.es; $('#example-status').textContent = localized('本句朗读 1 遍。', 'This sentence is read once.'); await speak(e.es, { rate: state.rate.examples }); }));
      document.querySelectorAll('.dialogue-play').forEach(button => button.addEventListener('click', async () => { const l = dialogue[Number(button.dataset.index)]; $('#dialogue-current').textContent = `${l[0]}：${l[1]}`; $('#dialogue-status').textContent = localized('本句朗读 1 遍。', 'This line is read once.'); await speak(l[1], { rate: state.rate.dialogue, role: l[0] }); }));
    }
    document.querySelectorAll('.term-mode').forEach(button => button.addEventListener('click', async () => {
      const times = Number(button.dataset.times), lesson = currentLesson();
      const items = lesson.words.flatMap(w => Array.from({ length: times }, () => ({ text: w.word, word: w })));
      const completed = await speakSequence(items, { pauseAfterLast: true }, (item, index) => { $('#term-current').textContent = `${item.word.word} · ${meaningFor(item.word)}`; $('#term-status').textContent = localized(`第 ${(index % times) + 1} / ${times} 遍；结束后停顿 1 秒。`, `Reading ${(index % times) + 1} / ${times}; one-second pause follows.`); });
      if (completed) { $('#term-current').textContent = localized('完成！', 'Finished!'); $('#term-status').textContent = localized('可以切换为每词 1 遍或 3 遍再练一次。', 'Choose one or three readings per word to practise again.'); }
    }));
    $('#play-examples').addEventListener('click', async () => { const examples = pairExamples(currentLesson()); const completed = await speakSequence(examples.map(e => ({ text: e.es })), { rate: state.rate.examples }, (item, index) => { $('#example-current').textContent = item.text; $('#example-status').textContent = localized(`第 ${index + 1} / 5 句；本句朗读 1 遍。`, `Sentence ${index + 1} / 5; read once.`); }); if (completed) $('#example-status').textContent = localized('例句已朗读完毕。', 'Examples have finished.'); });
    $('#play-dialogue').addEventListener('click', async () => { const dialogue = makeDialogue(currentLesson()).slice(state.dialogueStart); const completed = await speakSequence(dialogue.map(l => ({ text: l[1], role: l[0] })), { rate: state.rate.dialogue }, (item, index) => { const position = state.dialogueStart + index; $('#dialogue-progress').value = position; $('#dialogue-current').textContent = `${item.role}：${item.text}`; $('#dialogue-status').textContent = localized(`第 ${position + 1} / 5 句；本句朗读 1 遍。`, `Line ${position + 1} / 5; read once.`); }); if (completed) { $('#dialogue-progress').value = 5; $('#dialogue-position').textContent = localized('对话完成', 'Dialogue complete'); $('#dialogue-status').textContent = localized('A 与 B 的整段对话已朗读完毕。', 'The full A/B dialogue has finished.'); } });
    $('#dialogue-progress').addEventListener('input', event => { stopAll(); const value = Number(event.target.value); state.dialogueStart = value === 5 ? 0 : value; $('#dialogue-position').textContent = value === 5 ? localized('已到结尾；再次播放会从第一句开始', 'At the end; play starts again from line one') : localized(`从第 ${value + 1} / 5 句开始播放`, `Start from line ${value + 1} / 5`); });
    document.querySelectorAll('.speed-controls').forEach(group => group.addEventListener('click', event => { const button = event.target.closest('.speed'); if (!button) return; const target = group.dataset.target; state.rate[target] = Number(button.dataset.rate); group.querySelectorAll('.speed').forEach(b => b.classList.toggle('active', b === button)); }));
    document.querySelectorAll('.stop-all').forEach(button => button.addEventListener('click', () => { stopAll(); $('#term-status').textContent = localized('已停止。', 'Stopped.'); $('#example-status').textContent = localized('已停止。', 'Stopped.'); $('#dialogue-status').textContent = localized('已停止。', 'Stopped.'); }));
    function selectLesson(id) { state.lessonId = Math.min(lessons.length, Math.max(1, id)); history.replaceState(null, '', `#leccion-${state.lessonId}`); localStorage.setItem('spanish-course-lesson', state.lessonId); void saveProgress(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    $('#lesson-nav').addEventListener('click', event => { const link = event.target.closest('[data-lesson]'); if (!link) return; event.preventDefault(); selectLesson(Number(link.dataset.lesson)); });
    ['previous', 'previous-bottom'].forEach(id => $(`#${id}`).addEventListener('click', () => selectLesson(state.lessonId - 1)));
    ['next', 'next-bottom'].forEach(id => $(`#${id}`).addEventListener('click', () => selectLesson(state.lessonId + 1)));
    $('#language-toggle').addEventListener('click', () => { state.lang = isEnglish() ? 'zh' : 'en'; localStorage.setItem('spanish-course-language', state.lang); render(); });
    $('#account-toggle').addEventListener('click', () => {
      if (!state.user) return openAuthModal('register');
      $('#account-panel').hidden = !$('#account-panel').hidden;
    });
    $('#account-open').addEventListener('click', () => openAuthModal('register'));
    $('#logout').addEventListener('click', async () => { await signOut(auth); $('#account-panel').hidden = true; });
    $('#auth-close').addEventListener('click', closeAuthModal);
    $('#auth-modal').addEventListener('click', event => { if (event.target === $('#auth-modal')) closeAuthModal(); });
    $('#auth-switch').addEventListener('click', () => { state.authMode = state.authMode === 'register' ? 'login' : 'register'; $('#auth-status').textContent = ''; updateAuthForm(); });
    $('#auth-form').addEventListener('submit', handleAuthSubmit);
    $('#complete-lesson').addEventListener('click', async () => {
      if (!state.user) return openAuthModal('register');
      const lessonId = state.lessonId;
      state.completedLessons = state.completedLessons.includes(lessonId)
        ? state.completedLessons.filter(id => id !== lessonId)
        : [...state.completedLessons, lessonId];
      renderProgress();
      try { await saveProgress(); }
      catch (error) { $('#course-progress-text').textContent = localized('保存进度失败，请稍后再试。', 'Saving progress failed. Please try again later.'); }
    });
    onAuthStateChanged(auth, user => {
      state.user = user;
      if (user) { void loadProgress(user); }
      else { state.completedLessons = []; $('#account-panel').hidden = true; renderAccount(); renderProgress(); }
    });
    const hashId = Number(location.hash.replace('#leccion-', '')); const savedId = Number(localStorage.getItem('spanish-course-lesson')); const savedLanguage = localStorage.getItem('spanish-course-language');
    state.lang = savedLanguage === 'en' ? 'en' : 'zh';
    state.lessonId = lessons.some(l => l.id === hashId) ? hashId : (lessons.some(l => l.id === savedId) ? savedId : 1);
    render();
  </script>
</body>
</html>
